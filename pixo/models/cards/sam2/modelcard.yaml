name: sam2
description: "SAM 2.1 -- Segment Anything Model 2 by Meta"
version: "2.1"
task: segmentation
author: meta

source:
  type: huggingface
  repo: facebook/sam2.1-hiera-large

dependencies:
  python: ">=3.9"
  packages:
    - torch>=2.0
    - transformers>=4.40
    - opencv-python>=4.8.0
    - numpy>=1.24

hardware:
  min_ram_gb: 4
  recommended_ram_gb: 16
  min_vram_gb: 2
  recommended_vram_gb: 8
  cpu_fallback: true

inputs:
  - type: image
    formats: [jpg, png, bmp]

outputs:
  - type: masks
    format: png
  - type: metadata
    format: json
  - type: annotated
    format: image

variants:
  default:
    filename: model.safetensors
    size_mb: 898
    description: "Large -- best quality segmentation"
  base_plus:
    filename: model.safetensors
    size_mb: 324
    description: "Base+ -- good quality, lighter"
  small:
    filename: model.safetensors
    size_mb: 185
    description: "Small -- fast, still good"
  tiny:
    filename: model.safetensors
    size_mb: 156
    description: "Tiny -- smallest, runs anywhere"

checkpoint:
  supported: false
