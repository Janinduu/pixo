name: yolov12
description: "Latest YOLO with attention-based architecture. State-of-the-art accuracy and speed."
version: "12.0"
task: detection
author: sunsmarterjie

source:
  type: huggingface
  repo: sunsmarterjie/yolov12

dependencies:
  python: ">=3.9"
  packages:
    - ultralytics>=8.3.0
    - opencv-python>=4.8.0

hardware:
  min_ram_gb: 2
  recommended_ram_gb: 8
  min_vram_gb: 0
  recommended_vram_gb: 4
  cpu_fallback: true

inputs:
  - type: image
    formats: [jpg, png, bmp, webp]
  - type: video
    formats: [mp4, avi, mov, mkv, webm]

outputs:
  - type: boxes
    format: json
  - type: labels
    format: json
  - type: annotated
    format: image/video

variants:
  default:
    filename: yolo12n.pt
    size_mb: 7
    description: "Nano -- fastest"
  small:
    filename: yolo12s.pt
    size_mb: 22
    description: "Small -- good balance"
  medium:
    filename: yolo12m.pt
    size_mb: 42
    description: "Medium -- more accurate"
  large:
    filename: yolo12l.pt
    size_mb: 54
    description: "Large -- high accuracy"
  xlarge:
    filename: yolo12x.pt
    size_mb: 109
    description: "Extra large -- best accuracy"

checkpoint:
  supported: true
  every: 500
privacy:
  level: green
  note: "Runs fully offline after weights are downloaded."
