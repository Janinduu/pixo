name: florence2
description: "Versatile vision-language model. Captioning, OCR, object detection, and more -- all in one model."
version: "2.0"
task: vision-language
author: Microsoft

source:
  type: huggingface
  repo: microsoft/Florence-2-base

dependencies:
  python: ">=3.9"
  packages:
    - torch>=2.0
    - "transformers<5.0"
    - timm
    - einops

hardware:
  min_ram_gb: 4
  recommended_ram_gb: 16
  min_vram_gb: 0
  recommended_vram_gb: 8
  cpu_fallback: true

inputs:
  - type: image
    formats: [jpg, png, bmp]

outputs:
  - type: text
    format: json
  - type: boxes
    format: json
  - type: labels
    format: json

variants:
  default:
    filename: model.safetensors
    size_mb: 460
    repo: microsoft/Florence-2-base
    description: "Base -- good balance"
  large:
    filename: model.safetensors
    size_mb: 1520
    repo: microsoft/Florence-2-large
    description: "Large -- best quality"

checkpoint:
  supported: false