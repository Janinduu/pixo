name: samurai
description: "Video object tracking built on SAM2. Track any object across video frames automatically."
version: "1.0"
task: video-tracking-segmentation
author: University of Washington

source:
  type: huggingface
  repo: facebook/sam2.1-hiera-large

dependencies:
  python: ">=3.9"
  packages:
    - torch>=2.0
    - transformers>=4.40
    - opencv-python>=4.8.0
    - numpy>=1.24

hardware:
  min_ram_gb: 8
  recommended_ram_gb: 16
  min_vram_gb: 4
  recommended_vram_gb: 8
  cpu_fallback: true

inputs:
  - type: video
    formats: [mp4, avi, mov]
  - type: image
    formats: [jpg, png, bmp]

outputs:
  - type: masks
    format: png
  - type: tracked_video
    format: mp4
  - type: metadata
    format: json

variants:
  default:
    filename: model.safetensors
    size_mb: 898
    repo: facebook/sam2.1-hiera-large
    description: "Large -- best tracking quality"
  lite:
    filename: model.safetensors
    size_mb: 324
    repo: facebook/sam2.1-hiera-base-plus
    description: "Base plus -- good balance of speed and quality"
  tiny:
    filename: model.safetensors
    size_mb: 156
    repo: facebook/sam2.1-hiera-tiny
    description: "Tiny -- fastest, lower accuracy"

checkpoint:
  supported: true
  every: 100