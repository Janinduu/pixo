name: samurai
description: "SAMURAI -- segment and track anything in video"
version: "1.0"
task: video-tracking-segmentation
author: yangchris11

source:
  type: huggingface
  repo: facebook/sam2.1-hiera-large

dependencies:
  python: ">=3.9,<3.12"
  packages:
    - sam2
    - numpy>=1.24
    - opencv-python>=4.8.0
    - torch>=2.0

hardware:
  min_ram_gb: 8
  recommended_ram_gb: 16
  min_vram_gb: 4
  recommended_vram_gb: 8
  cpu_fallback: true

inputs:
  - type: video
    formats: [mp4, avi, mov]
  - type: image
    formats: [jpg, png, bmp]

outputs:
  - type: masks
    format: png
  - type: tracked_video
    format: mp4
  - type: metadata
    format: json

variants:
  default:
    filename: model.safetensors
    size_mb: 898
    description: "Large -- best quality, uses SAM2.1 hiera-large"
  lite:
    filename: model.safetensors
    size_mb: 324
    description: "Base plus -- good balance of speed and quality"
  tiny:
    filename: model.safetensors
    size_mb: 156
    description: "Tiny -- fastest, lower accuracy"

checkpoint:
  supported: true
  every: 100
