name: yolov11
description: "Real-time object detection. Improved architecture over v8 with better accuracy and speed."
version: "11.0"
task: detection
author: Ultralytics

source:
  type: huggingface
  repo: Ultralytics/YOLO11

dependencies:
  python: ">=3.9"
  packages:
    - ultralytics>=8.3.0
    - opencv-python>=4.8.0

hardware:
  min_ram_gb: 2
  recommended_ram_gb: 8
  min_vram_gb: 0
  recommended_vram_gb: 4
  cpu_fallback: true

inputs:
  - type: image
    formats: [jpg, png, bmp, webp]
  - type: video
    formats: [mp4, avi, mov, mkv, webm]

outputs:
  - type: boxes
    format: json
  - type: labels
    format: json
  - type: annotated
    format: image/video

variants:
  default:
    filename: yolo11n.pt
    size_mb: 5
    description: "Nano -- fastest, good for quick tests"
  small:
    filename: yolo11s.pt
    size_mb: 19
    description: "Small -- good balance of speed and accuracy"
  medium:
    filename: yolo11m.pt
    size_mb: 39
    description: "Medium -- more accurate, slower"
  large:
    filename: yolo11l.pt
    size_mb: 49
    description: "Large -- high accuracy"
  xlarge:
    filename: yolo11x.pt
    size_mb: 57
    description: "Extra large -- best accuracy"

checkpoint:
  supported: true
  every: 500